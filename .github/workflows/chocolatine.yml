name: Chocolatine

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_SSH_URL }}
  EXECUTABLES: ${{vars.EXECUTABLES}}

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    if: ${{ github.repository != vars.MIRROR_REPO }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check repository with banana
        run: banana-check-repo
      - name: Compile project
        run: make
        timeout-minutes: 2
        env:
          CC: epiclang
      - name: Display coding style errors
        run: |
          if [ -f coding-style-reports.log ]; then
           while read line; do
             echo "::error file=$(echo $line | cut -d: -f1),line=$(echo $line | cut -d: -f2)::$(echo $line | cut -d: -f3)"
           done < coding-style-reports.log
           exit 1
          fi
      - name: Make clean
        run: make clean
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    if: ${{ github.repository != vars.MIRROR_REPO }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run tests
        run: make tests_run
        timeout-minutes: 2
  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.repository != vars.MIRROR_REPO }}
    needs: run_tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
